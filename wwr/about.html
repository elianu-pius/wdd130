<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
        content="Get in touch with White Water Rafting. Find our contact details, meet our team, and send us a message using our contact form.">
    <meta name="author" content="Elianu Pius">
    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <header>
        <a href="index.html" class="brand" title="go to home page">
            <img src="images/logo.jpg" alt="White Water Rafting site logo" class="logo">
        </a>
        <nav>
            <a href="index.html">home</a>
            <a href="about.html">about us</a>
            <a href="trips.html">trips</a>
            <a href="contact.html">contact</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>

        <section class="company-info">
            <h2>Our Information</h2>
            <p><strong>Address:</strong> 25 Victoria Clause, gabba road kampala uganda </p>
            <p><strong>Phone:</strong> + (256) 123-4567</p>
            <p><strong>Email:</strong> info@whitewaterrafting.com</p>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.086387242334!2d-122.41941508468123!3d37.77492977975909!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085808e5a5f7b7f%3A0xe4d7c03c8cfad8b1!2sRafting%20Center!5e0!3m2!1sen!2sus!4v1616010000000"
                width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </section>
        <section class="team">
            <h2>Meet Our Team</h2>
            <figure>
                <img src="images/happy_clients.jpg" alt="Lead Guide">
                <figcaption>John Doe Lead Guide</figcaption>
            </figure>
            <figure>
                <img src="images/team.png" alt="Safety Expert">
                <figcaption>Echeku Micheal (middle) Safety Expert</figcaption>
            </figure>
            <figure>
                <img src="images/micheal.png" alt="Adventure Coordinator">
                <figcaption>Etiau David Adventure Coordinator</figcaption>
            </figure>
        </section>
        <section class="contact-form">
            <h2>Send Us a Message</h2>
            <form action="#" method="post">
                <label for="name">Elianu pius:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email Address:</label>
                <input type="email" id="elianupius34@gmail.com" name="elianupius34@gmail.com" required>

                <p>Purpose of Message:</p>
                <label><input type="radio" name="purpose" value="general" required> General Inquiry</label>
                <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
                <label><input type="radio" name="purpose" value="website"> Website Suggestion</label>
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="6" required></textarea>
                <label>
                    <input type="checkbox" name="subscribe"> Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2025 White Water Rafting | All rights Reserved | Elianu Pius.</p>

            <a href="https://www.facebook.com" target="_blank">

            <a href="https://www.twitter.com" target="_blank">

            </a>
            <a href="https://www.instagram.com" target="_blank">
                <img src="images/instagram.png" alt="Instagram logo" width="40">
            </a>
        </nav>
    </footer>
</body>

</html>
